name: CI

on:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - run: npm ci

      - run: npm run build

      - run: npm run lint

      - run: npm test

      - name: Verify FR 2052a / LCR example
        run: |
          set -e
          for f in examples/fr2052a-lcr/*.md; do
            echo "=== $f ==="
            node dist/cli.js verify "$f"
          done

      - name: Validate FR 2052a / LCR corpus
        working-directory: examples/fr2052a-lcr
        run: node ../../dist/cli.js validate
